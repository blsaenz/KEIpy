#   eco_parm_nitrif_par_lim: 5.0  # PAR limit nitrification (W/m^2)
#   eco_parm_POC_flux_ref: 0.002  # reference POC flux (nmol C/cm^2/s)
#   eco_parm_rest_prod_tau_days: 30.0  # restoring prod time-scale (days); ×spd→ sec
