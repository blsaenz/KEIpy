# Conda-native stack for ``make -C f90 kei`` (compilers + OpenBLAS + Meson tooling).
# Example setup: create/update an env with miniforge/mamba:
#   mamba env create -f environment.yml --name py313    # initial
#   mamba env update -f environment.yml --name py313    # merge packages
channels:
  - conda-forge
  - nodefaults
channel_priority: strict
dependencies:
  - python>=3.11,<3.14
  - pip
  - compilers              # conda-forge C/C++/Fortran toolchain for current platform
  - numpy                  # owns ``python -m numpy.f2py``
  - liblapack              # netlib LAPACK ABI (conda-forge -> OpenBLAS); ``Makefile`` links ``-llapack``
  - pandas                 # used by kei.py + tests
  - xarray                 # used by forcing + output + tests
  - cftime                 # used for xr.date_range(..., use_cftime=True)
  - netcdf4                # used by kei_util (date2num) + xarray engine
  - numba                  # used by kei_util (jit)
  - meson
  - ninja
  - charset-normalizer     # Fortran sources with UTF-8 comments (NumPy Meson parses as text)
  - pyyaml                 # ``kei_simulation.apply_runtime_yaml`` / ``kei_runtime_params.yml``
  - pytest>=7              # matches ``[project.optional-dependencies] dev``
